<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诸神愚戏 · 副本排行榜</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        :root {
            --bg: #0b0b10;
            --bg-card: #12121f;
            --bg-card-hover: #1a1a2c;
            --gold: #c5a668;
            --gold-light: #e7cf8a;
            --gold-dark: #7a5d2e;
            --text: #c5c5d2;
            --text-muted: #7a7a8c;
            --text-bright: #eaeaf2;
            --border: #222233;
            --accent: #a67c2e;
            --danger: #8b3a3a;
            --star-color: #e2b04a;
            --path-life: #77c37b;
            --path-fall: #a05064;
            --path-civil: #d0aa55;
            --path-chaos: #9a78e0;
            --path-exist: #75bdd0;
            --path-void: #d7d7e8;
            --difficulty-newbie: #7bbf8c;
            --difficulty-low: #69a9cf;
            --difficulty-medium: #d0aa55;
            --difficulty-high: #d76b4a;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            --transition: 0.2s ease;
            --font-display: 'Cinzel', 'Georgia', 'Noto Serif SC', serif;
            --font-body: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            --bg-pattern: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow-anchor: none;
        }

        body {
            background: var(--bg);
            background-image: var(--bg-pattern), radial-gradient(ellipse at 20% 10%, rgba(180, 130, 50, 0.05) 0%, transparent 60%), radial-gradient(ellipse at 80% 90%, rgba(160, 100, 180, 0.03) 0%, transparent 60%);
            color: var(--text);
            font-family: var(--font-body);
            min-height: 100vh;
            line-height: 1.6;
            backdrop-filter: blur(1px);
        }

        /* ========== 顶部导航 ========== */
        .header {
            background: rgba(14, 14, 24, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6);
        }
        .header .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: var(--font-display);
            font-size: 1.6rem;
            color: var(--gold-light);
            letter-spacing: 0.06em;
            user-select: none;
            white-space: nowrap;
            text-shadow: 0 0 20px rgba(200, 160, 80, 0.3);
        }
        .header .logo .icon {
            font-size: 2rem;
            filter: drop-shadow(0 0 8px rgba(200, 160, 80, 0.5));
        }
        .header .logo .sub {
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            display: block;
            line-height: 1;
            font-family: var(--font-body);
            text-transform: uppercase;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .role-badge {
            padding: 7px 12px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            color: var(--text-muted);
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        .role-badge.active {
            color: var(--gold-light);
            border-color: rgba(200, 160, 80, 0.35);
            background: rgba(184, 134, 11, 0.12);
        }
        .btn {
            padding: 10px 22px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            transition: all var(--transition);
            border: 1px solid transparent;
            font-family: var(--font-body);
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }
        .btn-primary {
            background: linear-gradient(135deg, #b8860b 0%, #8b6914 100%);
            color: #f5f0e6;
            border-color: #c9a96e;
            box-shadow: 0 0 20px rgba(184, 134, 11, 0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .btn-primary:hover {
            box-shadow: 0 0 35px rgba(200, 150, 20, 0.5);
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            color: var(--gold-light);
            border-color: var(--gold-dark);
        }
        .btn-outline:hover {
            background: rgba(184, 134, 11, 0.1);
            border-color: var(--gold-light);
        }
        .btn-danger {
            background: rgba(139, 58, 58, 0.18);
            color: #ffb7b0;
            border-color: rgba(190, 70, 60, 0.45);
        }
        .btn-danger:hover {
            background: rgba(170, 64, 52, 0.25);
            border-color: #d56f63;
        }
        .btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-sm {
            padding: 6px 16px;
            font-size: 0.8rem;
            border-radius: 20px;
        }
        .btn-xs {
            padding: 4px 12px;
            font-size: 0.7rem;
            border-radius: 16px;
        }

        /* ========== 主容器 ========== */
        .container {
            max-width: 1120px;
            margin: 0 auto;
            padding: 28px 20px 70px;
        }

        /* ========== 控制栏 ========== */
        .controls {
            display: grid;
            gap: 14px;
            align-items: stretch;
            margin-bottom: 28px;
            background: rgba(255,255,255,0.02);
            padding: 16px;
            border-radius: var(--radius);
            border: 1px solid rgba(255,255,255,0.04);
            backdrop-filter: blur(10px);
        }
        .control-topline {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .controls .sort-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .controls .sort-btn {
            padding: 8px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            background: rgba(255,255,255,0.03);
            color: var(--text-muted);
            border: 1px solid var(--border);
            transition: all var(--transition);
            font-family: var(--font-body);
            white-space: nowrap;
            backdrop-filter: blur(5px);
        }
        .controls .sort-btn.active {
            background: rgba(184, 134, 11, 0.2);
            color: var(--gold-light);
            border-color: var(--gold-dark);
            box-shadow: 0 0 15px rgba(180, 130, 50, 0.2);
        }
        .controls .sort-btn:hover {
            border-color: var(--text-muted);
            color: var(--text-bright);
        }
        .search-input {
            padding: 10px 18px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: rgba(10,10,20,0.6);
            color: var(--text-bright);
            font-size: 0.85rem;
            font-family: var(--font-body);
            min-width: 200px;
            flex: 1;
            max-width: 300px;
            transition: all var(--transition);
            backdrop-filter: blur(5px);
        }
        .search-input:focus {
            outline: none;
            border-color: var(--gold-dark);
            box-shadow: 0 0 0 4px rgba(184, 134, 11, 0.08);
        }
        .god-filter-panel {
            position: relative;
            display: grid;
            gap: 12px;
            padding: 14px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, rgba(255,255,255,0.035), rgba(255,255,255,0.01));
            border: 1px solid rgba(255,255,255,0.06);
            overflow: hidden;
        }
        .god-filter-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px),
                linear-gradient(0deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 34px 34px;
            mask-image: linear-gradient(90deg, transparent, #000 15%, #000 85%, transparent);
            pointer-events: none;
        }
        .filter-heading {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            color: var(--text-bright);
            font-size: 0.82rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        .filter-heading span:last-child {
            color: var(--text-muted);
            font-size: 0.72rem;
            letter-spacing: 0.06em;
            text-transform: none;
        }
        .god-filter-list {
            position: relative;
            display: grid;
            gap: 10px;
        }
        .god-cluster {
            display: grid;
            grid-template-columns: 72px 1fr;
            gap: 10px;
            align-items: start;
        }
        .god-cluster-title {
            padding-top: 7px;
            color: var(--text-muted);
            font-size: 0.72rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }
        .god-cluster-buttons, .difficulty-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .god-button, .difficulty-filter-btn {
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 999px;
            background: rgba(8,8,14,0.62);
            color: var(--text);
            padding: 7px 12px;
            font-family: var(--font-body);
            font-size: 0.76rem;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
        }
        .god-button:hover, .difficulty-filter-btn:hover {
            color: var(--text-bright);
            border-color: rgba(255,255,255,0.18);
            transform: translateY(-1px);
        }
        .god-button.active, .difficulty-filter-btn.active {
            color: #08080d;
            font-weight: 800;
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 0 18px rgba(200,160,80,0.18);
        }
        .god-button.path-life.active { background: var(--path-life); }
        .god-button.path-fall.active { background: var(--path-fall); color: #fff4f7; }
        .god-button.path-civil.active { background: var(--path-civil); }
        .god-button.path-chaos.active { background: var(--path-chaos); color: #f7f0ff; }
        .god-button.path-exist.active { background: var(--path-exist); }
        .god-button.path-void.active { background: var(--path-void); }
        .god-button.path-all.active, .difficulty-filter-btn.active { background: var(--gold-light); }
        .difficulty-filter {
            padding-top: 2px;
        }

        /* ========== 副本卡片列表 ========== */
        .dungeon-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .dungeon-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            cursor: pointer;
            transition: all var(--transition);
            position: relative;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            background-image: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 50%);
        }
        .dungeon-card:hover {
            background: var(--bg-card-hover);
            border-color: #3a3a4a;
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 30px rgba(180, 130, 50, 0.1);
        }
        .dungeon-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, var(--gold-dark), transparent);
            border-radius: 3px 0 0 3px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .dungeon-card:hover::before {
            opacity: 1;
        }
        .dungeon-card .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .dungeon-card .card-title {
            font-family: var(--font-display);
            font-size: 1.25rem;
            color: var(--text-bright);
            letter-spacing: 0.04em;
            flex: 1;
            min-width: 200px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .dungeon-card .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .dungeon-card .rating-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(226, 176, 74, 0.12);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 700;
            color: var(--star-color);
            font-size: 0.95rem;
            white-space: nowrap;
            flex-shrink: 0;
            border: 1px solid rgba(226, 176, 74, 0.3);
        }
        .dungeon-card .card-desc {
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
            font-style: italic;
        }
        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-transform: uppercase;
        }
        .tag.difficulty-newbie { color: var(--difficulty-newbie); border-color: rgba(123, 191, 140, 0.35); background: rgba(123, 191, 140, 0.09); }
        .tag.difficulty-low { color: var(--difficulty-low); border-color: rgba(105, 169, 207, 0.35); background: rgba(105, 169, 207, 0.09); }
        .tag.difficulty-medium { color: var(--difficulty-medium); border-color: rgba(208, 170, 85, 0.35); background: rgba(208, 170, 85, 0.09); }
        .tag.difficulty-high { color: var(--difficulty-high); border-color: rgba(215, 107, 74, 0.38); background: rgba(215, 107, 74, 0.1); }
        .tag.god-tag {
            color: var(--gold-light);
            background: rgba(200, 160, 80, 0.1);
            border-color: rgba(200, 160, 80, 0.3);
        }
        .tag.path-tag {
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.025);
        }
        .tag.path-life { color: var(--path-life); border-color: rgba(119, 195, 123, 0.34); background: rgba(119, 195, 123, 0.08); }
        .tag.path-fall { color: var(--path-fall); border-color: rgba(160, 80, 100, 0.4); background: rgba(160, 80, 100, 0.1); }
        .tag.path-civil { color: var(--path-civil); border-color: rgba(208, 170, 85, 0.38); background: rgba(208, 170, 85, 0.08); }
        .tag.path-chaos { color: var(--path-chaos); border-color: rgba(154, 120, 224, 0.38); background: rgba(154, 120, 224, 0.09); }
        .tag.path-exist { color: var(--path-exist); border-color: rgba(117, 189, 208, 0.38); background: rgba(117, 189, 208, 0.09); }
        .tag.path-void { color: var(--path-void); border-color: rgba(215, 215, 232, 0.35); background: rgba(215, 215, 232, 0.08); }
        .tag.path-unknown { color: var(--text-muted); border-color: rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.035); }

        /* ========== 详情面板 ========== */
        .detail-overlay {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100dvh;
            max-height: 100dvh;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.78);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px;
            animation: fadeIn 0.3s ease;
            backdrop-filter: blur(8px);
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .detail-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            max-width: 1040px;
            width: 100%;
            max-height: calc(100vh - 56px);
            overflow: hidden;
            padding: 0;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(180, 130, 50, 0.15);
            animation: slideUp 0.3s ease;
            background-image: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 30%);
            display: flex;
            flex-direction: column;
        }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .detail-toolbar {
            position: sticky;
            top: 0;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            background: rgba(16, 15, 27, 0.96);
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.28);
        }
        .detail-back {
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.035);
            color: var(--text);
            border-radius: 999px;
            padding: 9px 14px;
            font-family: var(--font-body);
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
        }
        .detail-back:hover {
            color: var(--gold-light);
            border-color: rgba(213, 178, 91, 0.42);
            background: rgba(213, 178, 91, 0.08);
        }
        .detail-panel .close-btn {
            position: static;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-width: 88px;
            height: 38px;
            background: rgba(255, 255, 255, 0.055);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.82rem;
            font-weight: 800;
            cursor: pointer;
            padding: 0 12px;
            border-radius: 999px;
            transition: all var(--transition);
            line-height: 1;
        }
        .detail-panel .close-btn:hover { color: var(--text-bright); background: rgba(193, 69, 50, 0.22); border-color: rgba(215, 107, 74, 0.5); }
        .detail-content {
            min-height: 0;
            overflow-y: auto;
            padding: 30px 34px 34px;
            scrollbar-color: rgba(213, 178, 91, 0.55) rgba(255,255,255,0.05);
            scrollbar-width: thin;
        }
        .detail-content::-webkit-scrollbar { width: 10px; }
        .detail-content::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); border-radius: 999px; }
        .detail-content::-webkit-scrollbar-thumb { background: rgba(213, 178, 91, 0.5); border-radius: 999px; border: 2px solid rgba(16, 15, 27, 0.96); }
        .detail-content::-webkit-scrollbar-thumb:hover { background: rgba(213, 178, 91, 0.78); }
        .detail-panel h2 {
            font-family: var(--font-display);
            font-size: 1.7rem;
            color: var(--text-bright);
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            padding-right: 0;
            text-shadow: 0 0 10px rgba(200,160,80,0.2);
        }
        .detail-panel .detail-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 14px;
        }
        .detail-panel .detail-desc {
            background: rgba(0,0,0,0.3);
            border-radius: var(--radius-sm);
            padding: 18px 20px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            color: var(--text);
            line-height: 1.8;
            white-space: pre-wrap;
            border: 1px solid rgba(255,255,255,0.05);
            font-style: italic;
        }
        .detail-panel .section-title {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-bright);
            letter-spacing: 0.06em;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }

        /* 评分 */
        .rating-area {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            padding: 14px 18px;
            background: rgba(255,255,255,0.02);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255,255,255,0.04);
        }
        .stars { display: flex; gap: 4px; direction: rtl; }
        .stars input { display: none; }
        .stars label {
            font-size: 2rem;
            cursor: pointer;
            color: #2a2a3a;
            transition: all 0.2s ease;
            user-select: none;
            text-shadow: 0 0 8px transparent;
        }
        .stars label:hover,
        .stars label:hover ~ label,
        .stars input:checked ~ label {
            color: var(--star-color);
            text-shadow: 0 0 15px rgba(240, 185, 11, 0.7);
            transform: scale(1.1);
        }
        .stars.readonly label { cursor: default; pointer-events: none; }
        .rating-area .rating-text { font-size: 0.8rem; color: var(--text-muted); }

        .clear-panel {
            margin-bottom: 20px;
            padding: 16px 18px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(200,160,80,0.14);
            background:
                linear-gradient(135deg, rgba(184,134,11,0.10), rgba(255,255,255,0.02)),
                rgba(0,0,0,0.22);
        }
        .clear-panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .clear-panel-title {
            font-weight: 700;
            color: var(--text-bright);
            letter-spacing: 0.04em;
        }
        .clear-rate-big {
            font-family: var(--font-display);
            color: var(--gold-light);
            font-size: 1.4rem;
            text-shadow: 0 0 14px rgba(200,160,80,0.25);
        }
        .clear-progress {
            height: 8px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .clear-progress-fill {
            height: 100%;
            width: 0%;
            max-width: 100%;
            background: linear-gradient(90deg, #d8b763, #7fd8be);
            box-shadow: 0 0 18px rgba(127,216,190,0.35);
        }
        .clear-panel-foot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .feedback-picker {
            margin-top: 14px;
            display: grid;
            gap: 10px;
        }
        .feedback-tags, .feedback-summary-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .feedback-chip {
            border: 1px solid rgba(255,255,255,0.09);
            background: rgba(0,0,0,0.22);
            color: var(--text);
            border-radius: 999px;
            padding: 6px 11px;
            font-family: var(--font-body);
            font-size: 0.74rem;
            cursor: pointer;
            transition: all var(--transition);
        }
        .feedback-chip.active {
            color: #09090f;
            background: var(--gold-light);
            border-color: var(--gold-light);
            font-weight: 800;
        }
        .feedback-note {
            width: 100%;
            min-height: 66px;
            resize: vertical;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.32);
            color: var(--text-bright);
            padding: 10px 12px;
            font-family: var(--font-body);
            font-size: 0.82rem;
        }
        .feedback-note:focus { outline: none; border-color: var(--gold-dark); }
        .feedback-summary {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .feedback-summary-title {
            color: var(--text-muted);
            font-size: 0.76rem;
            margin-bottom: 8px;
        }
        .feedback-summary-pill {
            padding: 5px 10px;
            border-radius: 999px;
            color: var(--gold-light);
            border: 1px solid rgba(200,160,80,0.28);
            background: rgba(200,160,80,0.08);
            font-size: 0.74rem;
        }

        /* 评论 */
        .forum-feed {
            margin: -8px 0 26px;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--radius);
            background:
                linear-gradient(135deg, rgba(117,189,208,0.05), rgba(208,170,85,0.05)),
                rgba(255,255,255,0.015);
            padding: 14px 16px;
        }
        .forum-feed-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            color: var(--text-bright);
            font-size: 0.88rem;
            font-weight: 800;
            letter-spacing: 0.05em;
        }
        .forum-feed-head span:last-child {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.72rem;
        }
        .latest-comments-feed {
            display: grid;
            gap: 8px;
        }
        .feed-item {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            background: rgba(0,0,0,0.22);
            border: 1px solid rgba(255,255,255,0.04);
            cursor: pointer;
            transition: all var(--transition);
        }
        .feed-item:hover {
            border-color: rgba(200,160,80,0.25);
            transform: translateY(-1px);
        }
        .feed-title {
            color: var(--gold-light);
            font-size: 0.76rem;
            margin-bottom: 3px;
        }
        .feed-text {
            color: var(--text);
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .feed-time {
            color: var(--text-muted);
            font-size: 0.7rem;
            white-space: nowrap;
        }
        .pinned-note {
            margin-bottom: 18px;
            padding: 16px 18px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(208,170,85,0.22);
            background:
                linear-gradient(135deg, rgba(208,170,85,0.12), rgba(255,255,255,0.02)),
                rgba(0,0,0,0.18);
        }
        .pinned-note-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
            color: var(--gold-light);
            font-size: 0.82rem;
            font-weight: 800;
        }
        .pinned-note-body {
            color: var(--text);
            white-space: pre-wrap;
            line-height: 1.7;
            font-size: 0.86rem;
        }
        .pinned-note textarea {
            width: 100%;
            min-height: 92px;
            resize: vertical;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.34);
            color: var(--text-bright);
            padding: 10px 12px;
            font-family: var(--font-body);
            font-size: 0.84rem;
        }
        .comments-section { margin-top: 20px; }
        .comment-form {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .comment-form input, .comment-form textarea {
            flex: 1;
            min-width: 120px;
            padding: 10px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.4);
            color: var(--text-bright);
            font-size: 0.85rem;
            font-family: var(--font-body);
            transition: all var(--transition);
        }
        .comment-form textarea {
            min-height: 44px;
            resize: vertical;
        }
        .comment-form input:focus, .comment-form textarea:focus { outline: none; border-color: var(--gold-dark); }
        .reply-context {
            width: 100%;
            display: none;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            background: rgba(208,170,85,0.08);
            color: var(--gold-light);
            font-size: 0.78rem;
        }
        .comment-item {
            padding: 12px 16px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: var(--radius-sm);
            background: rgba(0,0,0,0.16);
            font-size: 0.85rem;
        }
        .comment-item.reply {
            margin-left: 28px;
            background: rgba(255,255,255,0.018);
            border-left-color: rgba(200,160,80,0.2);
        }
        .comment-item .comment-author { font-weight: 600; color: var(--gold-light); font-size: 0.8rem; }
        .comment-item .comment-time { font-size: 0.7rem; color: var(--text-muted); margin-left: 10px; }
        .comment-item .comment-content { margin-top: 6px; color: var(--text); white-space: pre-wrap; }
        .comment-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .text-action {
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: var(--font-body);
            font-size: 0.72rem;
            cursor: pointer;
            padding: 0;
        }
        .text-action:hover { color: var(--gold-light); }
        .deleted-comment {
            color: var(--text-muted);
            font-style: italic;
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 300;
            width: 100vw; height: 100dvh; max-height: 100dvh; overflow: hidden;
            display: flex; align-items: center; justify-content: center; padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); max-width: 760px; width: 100%;
            padding: 32px 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            animation: slideUp 0.3s ease; max-height: 90vh; overflow-y: auto;
            position: relative;
        }
        .modal h2 { font-family: var(--font-display); font-size: 1.5rem; color: var(--text-bright); margin-bottom: 24px; }
        .modal-note {
            color: var(--text-muted);
            margin: -12px 0 20px;
            font-size: 0.9rem;
        }
        .role-guide {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin: 16px 0 6px;
        }
        .role-card {
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.025);
            padding: 12px;
            min-height: 84px;
        }
        .role-card strong {
            display: block;
            color: var(--text-bright);
            margin-bottom: 4px;
            font-size: 0.9rem;
        }
        .role-card span {
            display: block;
            color: var(--text-muted);
            font-size: 0.76rem;
            line-height: 1.5;
        }
        .identity-card {
            display: none;
            margin: 18px 0;
            padding: 16px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(213, 178, 91, 0.22);
            background:
                linear-gradient(135deg, rgba(213, 178, 91, 0.08), rgba(123, 211, 194, 0.035)),
                rgba(255,255,255,0.025);
        }
        .identity-card.active { display: block; }
        .identity-card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }
        .identity-card-title {
            color: var(--gold-light);
            font-weight: 800;
            font-size: 0.86rem;
            letter-spacing: 0.04em;
        }
        .identity-card-role {
            color: var(--text-muted);
            font-size: 0.76rem;
        }
        .identity-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
        }
        .identity-row input {
            width: 100%;
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.38);
            color: var(--text-bright);
            font-family: var(--font-body);
            font-size: 0.9rem;
        }
        .identity-help {
            margin-top: 8px;
            color: var(--text-muted);
            font-size: 0.76rem;
            line-height: 1.5;
        }
        .comment-identity {
            min-width: 160px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(213, 178, 91, 0.2);
            background: rgba(213, 178, 91, 0.07);
            color: var(--text-muted);
            font-size: 0.78rem;
            line-height: 1.45;
        }
        .comment-identity strong {
            display: block;
            color: var(--gold-light);
            font-size: 0.94rem;
            margin-top: 2px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.04em; text-transform: uppercase; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 12px 16px; border-radius: var(--radius-sm);
            border: 1px solid var(--border); background: rgba(0,0,0,0.4);
            color: var(--text-bright); font-size: 0.9rem; font-family: var(--font-body);
            transition: all var(--transition); resize: vertical;
        }
        .form-group textarea { min-height: 100px; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none; border-color: var(--gold-dark); box-shadow: 0 0 0 4px rgba(184,134,11,0.06);
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }
        .form-grid.compact {
            grid-template-columns: 1.2fr 0.9fr 0.9fr;
        }
        .form-span { grid-column: 1 / -1; }
        .number-pair {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 8px;
        }
        .number-pair span {
            color: var(--text-muted);
            font-size: 0.82rem;
        }
        .metric-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .metric-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.035);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text);
            font-size: 0.75rem;
            white-space: nowrap;
        }
        .metric-pill strong {
            color: var(--text-bright);
            font-weight: 700;
        }
        .form-actions { display: flex; gap: 12px; justify-content: flex-end; flex-wrap: wrap; margin-top: 24px; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1c1c2e; color: var(--text-bright); padding: 14px 28px;
            border-radius: 30px; font-size: 0.9rem; z-index: 999;
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.8s forwards;
            pointer-events: none;
        }
        @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(20px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
        @keyframes toastOut { from { opacity:1; transform: translateX(-50%) translateY(0); } to { opacity:0; transform: translateX(-50%) translateY(20px); } }

        .loading { text-align: center; padding: 50px; color: var(--text-muted); }
        .spinner {
            display: inline-block; width: 30px; height: 30px;
            border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--gold-light);
            border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        @media (max-width: 720px) {
            .header { align-items: flex-start; }
            .header-actions { width: 100%; justify-content: flex-start; }
            .detail-overlay { padding: 8px; align-items: stretch; }
            .detail-panel {
                max-height: calc(100dvh - 16px);
                border-radius: 14px;
            }
            .detail-toolbar { padding: 10px 12px; }
            .detail-back {
                padding: 8px 11px;
                font-size: 0.78rem;
            }
            .detail-panel .close-btn {
                min-width: 74px;
                height: 34px;
                font-size: 0.78rem;
                padding: 0 10px;
            }
            .detail-content { padding: 20px 16px 24px; }
            .detail-panel h2 { font-size: 1.35rem; }
            .identity-row { grid-template-columns: 1fr; }
            .comment-identity { width: 100%; }
            .role-guide { grid-template-columns: 1fr; }
            .form-grid, .form-grid.compact { grid-template-columns: 1fr; }
            .form-span { grid-column: auto; }
            .controls { align-items: stretch; }
            .control-topline { align-items: stretch; }
            .controls .sort-group { width: 100%; }
            .god-cluster { grid-template-columns: 1fr; gap: 4px; }
            .god-cluster-title { padding-top: 0; }
            .search-input { max-width: none; width: 100%; }
            .feed-item { grid-template-columns: 1fr; }
            .comment-item.reply { margin-left: 10px; }
            .clear-panel-foot { align-items: stretch; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <span class="icon">♟️</span>
            <span>诸神愚戏<span class="sub">Folly of the Gods · 副本圣殿</span></span>
        </div>
        <div class="header-actions">
            <div class="role-badge" id="roleBadge">访客只读</div>
            <button class="btn btn-outline" id="inviteButton" onclick="openInviteModal()">🔑 输入邀请</button>
            <button class="btn btn-primary" id="submitEntryButton" onclick="openSubmitModal()">📜 献上你的副本</button>
        </div>
    </header>

    <div class="container">
        <div class="controls">
            <div class="control-topline">
                <div class="sort-group">
                    <button class="sort-btn active" data-sort="rating" onclick="setSort('rating', this)">⭐ 神眷评分</button>
                    <button class="sort-btn" data-sort="newest" onclick="setSort('newest', this)">🕐 最新降临</button>
                    <button class="sort-btn" data-sort="comments" onclick="setSort('comments', this)">💬 众声回响</button>
                </div>
                <input type="text" class="search-input" placeholder="🔍 搜索副本、作者、神明或命途..." oninput="debounceSearch()" id="searchInput">
            </div>
            <div class="god-filter-panel" aria-label="神明分区筛选">
                <div class="filter-heading">
                    <span>✦ 神明分区</span>
                    <span>按 16 位神明选择副本归属</span>
                </div>
                <div class="god-filter-list" id="godFilterList"></div>
            </div>
            <div class="difficulty-filter" id="difficultyFilterList" aria-label="难度标签筛选"></div>
        </div>

        <section class="forum-feed">
            <div class="forum-feed-head">
                <span>💬 最新回响</span>
                <span>论坛动态</span>
            </div>
            <div class="latest-comments-feed" id="latestCommentsFeed">
                <div class="feed-item"><div><div class="feed-title">正在听取众声……</div><div class="feed-text">评论流加载中</div></div><span class="feed-time">现在</span></div>
            </div>
        </section>

        <div class="dungeon-list" id="dungeonList">
            <div class="loading"><div class="spinner"></div><br>正在从诸神的棋盘中加载副本...</div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="detail-overlay" id="detailOverlay" style="display:none;" onclick="closeDetail(event)">
        <div class="detail-panel" id="detailPanel" onclick="event.stopPropagation()">
            <div class="detail-toolbar">
                <button class="detail-back" onclick="closeDetail()">← 返回列表</button>
                <button class="close-btn" onclick="closeDetail()" aria-label="关闭详情"><span>关闭</span><span>✕</span></button>
            </div>
            <div id="detailContent" class="detail-content"></div>
        </div>
    </div>

    <!-- 邀请弹窗 -->
    <div class="modal-overlay" id="inviteModalOverlay" style="display:none;" onclick="closeInviteModal(event)">
        <div class="modal" id="inviteModal" onclick="event.stopPropagation()">
            <button class="close-btn" style="position:absolute;top:16px;right:20px;" onclick="closeInviteModal()">✕</button>
            <h2>🔑 邀请权限</h2>
            <p class="modal-note" id="inviteHint">输入群内邀请码后，才能参与评分、评论或投稿。</p>
            <div class="form-group">
                <label>邀请码</label>
                <input type="password" id="inviteCodeInput" placeholder="输入玩家或作者邀请码" autocomplete="off">
            </div>
            <div class="role-guide">
                <div class="role-card"><strong>玩家</strong><span>评分、评论，不能投稿。</span></div>
                <div class="role-card"><strong>作者</strong><span>投稿、评分、评论。</span></div>
                <div class="role-card"><strong>馆主</strong><span>管理与删除副本。</span></div>
            </div>
            <div class="identity-card" id="identityCard">
                <div class="identity-card-head">
                    <div class="identity-card-title">身份铭牌</div>
                    <div class="identity-card-role" id="identityRoleText">未登录</div>
                </div>
                <div class="identity-row">
                    <input type="text" id="displayNameInput" maxlength="16" placeholder="绑定你的昵称，例如：无我">
                    <button type="button" class="btn btn-primary btn-sm" id="displayNameButton" onclick="saveDisplayName()">保存昵称</button>
                </div>
                <div class="identity-help">保存后，这个专属邀请码发评论、评分、投稿都会显示这个昵称。</div>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-outline" onclick="clearInviteSession()">退出身份</button>
                <button type="button" class="btn btn-primary" id="inviteSubmitButton" onclick="submitInviteCode()">进入圣殿</button>
            </div>
        </div>
    </div>

    <!-- 提交弹窗 -->
    <div class="modal-overlay" id="submitModalOverlay" style="display:none;" onclick="closeSubmitModal(event)">
        <div class="modal" id="submitModal" onclick="event.stopPropagation()">
            <button class="close-btn" style="position:absolute;top:16px;right:20px;" onclick="closeSubmitModal()">✕</button>
            <h2>📜 提交新副本</h2>
            <form id="submitForm" onsubmit="submitDungeon(event)">
                <div class="form-grid">
                    <div class="form-group"><label>副本名字 *</label><input type="text" id="dungeonName" placeholder="为你的试炼命名..." required maxlength="60"></div>
                    <div class="form-group"><label>作者名字 *</label><input type="text" id="dungeonCreator" placeholder="你的神名或代号..." required maxlength="30"></div>
                </div>
                <div class="form-grid compact">
                    <div class="form-group"><label>神明标签 *</label><select id="dungeonType" required><option value="记忆" selected>存在 · 记忆之神</option></select></div>
                    <div class="form-group"><label>固定人数 *</label><input type="number" id="participantCount" min="1" max="99" value="6" required></div>
